[Paths]
# Input Level-1 product folder (PROBA-V acquisition directory).
input = /mnt/ceph/proj/FDR4VGT/input/probav/20200402
# Output NetCDF Level-2A file path.
output = /mnt/ceph/proj/FDR4VGT/output/PROBAV_L1C_20200402_090258_2_1KM_X00Y00_V301_toc.nc
# MERRA-2 aerosol extinction file (NetCDF, date-matched).
merraaero = /archive2/data/MERRA2/aer_extinction/2020/MERRA2_400.tavg1_2d_aer_Nx.20200402.nc4
# MERRA-2 surface pressure and water vapor file (NetCDF, date-matched).
merraptwo = /archive2/data/MERRA2/surf_pression_water_vapor/2020/MERRA2_400.tavg1_2d_slv_Nx.20200402.nc4
# Root path to AMIP/MERRA monthly ancillary datasets.
amip_path = /mnt/ceph/data/MERRA2/
# Directory containing SMAC coefficient files.
smaccoef_dir =  /archive/proj/C3S
# DEM file used for elevation-driven pressure/terrain terms.
dem = /archive2/data/DEM/GLOBE/GTOPO30_DZ_MLUT.nc
# Local cache directory for precomputed SMACCL intermediate data.
kept_data_path = /data/smaccl/kept_data/
# Aerosol model fraction definition text file.
faer = ./ANCILLARY/Aerosol_model_fraction.txt
# Directory containing BRDF auxiliary inputs.
brdf_dir = /mnt/ceph/proj/FDR4VGT/input/brdf/
# JSON file containing CF metadata/attributes mapping.
cf_json_path = ./ANCILLARY/cf_attributes_res2.json
# Legend text file path used by quality map labeling workflows.
legend_file = /mnt/ceph/user/did/FDR4VGT/data/legend.txt
# Koppen-Geiger map raster (classification grid) path.
kp_map_file = /mnt/ceph/user/did/FDR4VGT/data/1991_2020/koppen_geiger_1p0.tif
# CSV mapping between Koppen-Geiger zone IDs and classes/multipliers.
mapping_file = /mnt/ceph/user/did/FDR4VGT/data/kg_zoneNumGueymard.csv
# ONNX model file used for RTM fit uncertainty estimation.
rmt_fit_file = ./ANCILLARY/model.onnx

[Sensor]
# Sensor identifier used to select reader and coefficients.
sensor = PROBA-V
# SMAC coefficient version tag (dimensionless).
smaccoef_version = 3.0

[Coefficients]
# Conversion factor from MERRA TQV kg/m^2 to SMAC g/cm^2 (x 1e-1).
k_uh2o = 1e-1
# Conversion factor from MERRA TO3 Dobson to SMAC cm-atm (x 1e-3).
k_uo3 = 1e-3
# Conversion factor from pressure Pa to hPa (x 1e-2).
k_p0 = 1e-2
# Absolute TOA reflectance uncertainty term (reflectance units).
Etoa = 0
# Relative TOA reflectance uncertainty term (fraction, unitless).
ERtoa = 0.01
# Absolute AOD uncertainty floor for tau550 (unitless AOD).
Etaup = 0.03
# Relative AOD uncertainty coefficient (fraction of AOD, unitless).
ERtaup = 0.15
# Absolute ozone uncertainty term (cm-atm equivalent units).
Euo3 = 0.0
# Relative ozone uncertainty term (fraction, unitless).
ERuo3 = 0.06
# Absolute water vapor uncertainty term (g/cm^2 equivalent units).
Euh2o = 0.0
# Relative water vapor uncertainty term (fraction, unitless).
ERuh2o = 0.2
# Absolute surface pressure uncertainty term (hPa).
Epre = 1.0
# Relative surface pressure uncertainty term (fraction, unitless).
ERpre = 0.0
# Minimum valid TOC reflectance threshold (unitless reflectance).
tocmin = 0.0        
# Maximum valid TOC reflectance threshold (unitless reflectance).
tocmax = 1.0235      
# Unified AOD threshold used for both QC and SMACCL internal high-AOD flag (unitless AOD).
aodmax = 0.6        
# Maximum allowed solar zenith angle for valid retrievals (degrees).
szamax = 80. 
# Maximum allowed spatial AOD gradient for quality control (AOD per pixel).
aodmax_grad = 1.4e-4
# Second-order residual uncertainty term u2(0) (unitless reflectance).
u2_0 = 7e-3

[Sizes]
# Number of aerosol models used for ensemble uncertainty estimation.
nmodels = 10
# Processing tile/chunk edge size in pixels.
chunks_size = 512

[Output]
# Enable writing Jacobian variables to output NetCDF.
jacobian = True

[Options]
# Toggle BRDF-related uncertainty contribution in total uncertainty.
enable_brdf_uncertainty = False
# Toggle Koppen-Geiger-based multiplier on AOD uncertainty.
enable_koppen_geiger_aod_multiplier = True
# Sensor ground sampling distance used by terrain/geolocation model (meters).
sensor_spatial_resolution_m = 1000
# Assumed geolocation uncertainty used for terrain-induced altitude error (pixels).
terrain_geolocation_error_pixels = 0.5
# Window size (pixels) for local maximum slope used in terrain uncertainty.
terrain_slope_window = 1
# Optional halo-aware Bit-3 expansion around high AOD-gradient seeds.
# aod_grad_morph_enable = True
# aod_grad_morph_radius_px = 1
# aod_grad_morph_closing_radius_px = 0
# aod_grad_morph_guard_rel = 0.5
# aod_grad_morph_aod_rel = 0.8